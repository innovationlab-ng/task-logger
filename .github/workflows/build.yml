name: Build & Package

# ── When this runs ────────────────────────────────────────────────────────────
# • Automatically on every push to the main branch
# • Manually from the GitHub Actions tab (workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Opt into Node.js 24 now so actions/checkout, setup-dotnet and
# upload-artifact run on the new runtime before GitHub forces the switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Windows installer (.exe)
  # Runs on a real Windows Server VM hosted by GitHub (free)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest

    steps:

      # 1. Download your source code onto the VM
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Install the correct .NET version
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. Generate .ico from the SVG icon using ImageMagick (pre-installed on windows-latest).
      #    The .csproj references installer\icon.ico as ApplicationIcon so this must
      #    run BEFORE dotnet publish.
      - name: Generate Windows icon (.ico)
        run: |
          magick installer/icon.svg `
            -define icon:auto-resize=256,128,64,48,32,16 `
            installer/icon.ico

      # 4. Compile and publish a single self-contained Windows binary
      #    --self-contained                   : bundles the .NET runtime — no install needed on target PC
      #    PublishSingleFile                  : merges everything into one .exe
      #    IncludeNativeLibrariesForSelfExtract: bundles native DLLs (libSkiaSharp etc.)
      #                                         so the app doesn't crash on first launch
      - name: Publish (Windows x64)
        run: >
          dotnet publish TaskLoggerApp.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win

      # 4. Run Inno Setup (pre-installed on all GitHub Windows runners)
      #    This reads installer/TaskLogger.iss and produces the setup wizard .exe
      - name: Build Windows installer (Inno Setup)
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          installer\TaskLogger.iss

      # 5. Upload the finished installer so you can download it from GitHub
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskLogger-Windows-Setup
          path: installer/Output/TaskLoggerSetup.exe
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — macOS DMG installer
  # Runs on a real macOS (Apple Silicon) VM hosted by GitHub (free)
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest   # Apple Silicon (M-series) runner

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Generate .icns from the SVG icon.
      # librsvg provides rsvg-convert to render SVG → PNG at exact pixel sizes.
      # iconutil (built into macOS) assembles the .iconset folder into a .icns file.
      - name: Generate macOS icon (.icns)
        run: |
          brew install librsvg
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512; do
            rsvg-convert -w $size -h $size installer/icon.svg \
              > AppIcon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            rsvg-convert -w $double -h $double installer/icon.svg \
              > AppIcon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns AppIcon.iconset -o installer/AppIcon.icns

      # Publish Apple Silicon binary
      # NO PublishSingleFile — on macOS, native .dylib files (libSkiaSharp etc.)
      # must sit alongside the binary inside Contents/MacOS/. Bundling them into
      # a single file causes a crash because macOS security prevents extracting
      # them to a temp directory at runtime.
      - name: Publish (macOS arm64)
        run: >
          dotnet publish TaskLoggerApp.csproj
          -c Release
          -r osx-arm64
          --self-contained true
          -o publish/osx-arm64

      # Publish Intel binary (for older Macs)
      - name: Publish (macOS x64)
        run: >
          dotnet publish TaskLoggerApp.csproj
          -c Release
          -r osx-x64
          --self-contained true
          -o publish/osx-x64

      # Build a universal .app bundle that runs on BOTH Apple Silicon AND Intel Macs.
      # Strategy:
      #   1. Copy all files from the arm64 publish (dlls, dylibs, configs)
      #   2. Use `lipo` to merge the two architecture-specific binaries and dylibs
      #      into single "fat" universal binaries
      #   3. The result runs natively on both architectures
      - name: Build universal .app bundle
        run: |
          mkdir -p "TaskLogger.app/Contents/MacOS"
          mkdir -p "TaskLogger.app/Contents/Resources"

          # Start with arm64 as the base (all managed .dll files are arch-neutral)
          cp -r publish/osx-arm64/. "TaskLogger.app/Contents/MacOS/"

          # Merge the main executable into a universal binary
          lipo -create \
            publish/osx-arm64/TaskLoggerApp \
            publish/osx-x64/TaskLoggerApp \
            -output "TaskLogger.app/Contents/MacOS/TaskLogger"
          # Remove the arm64-only copy that was copied from the base
          rm -f "TaskLogger.app/Contents/MacOS/TaskLoggerApp"
          chmod +x "TaskLogger.app/Contents/MacOS/TaskLogger"

          # Merge each native .dylib into a universal dylib
          for lib in publish/osx-arm64/*.dylib; do
            name=$(basename "$lib")
            x64="publish/osx-x64/$name"
            dest="TaskLogger.app/Contents/MacOS/$name"
            if [ -f "$x64" ]; then
              lipo -create "$lib" "$x64" -output "$dest"
            fi
          done

          cp installer/Info.plist "TaskLogger.app/Contents/Info.plist"
          cp installer/AppIcon.icns "TaskLogger.app/Contents/Resources/AppIcon.icns"

      - name: Ad-hoc sign .app bundle
        run: |
          # Delete files that codesign cannot sign and are not needed at runtime:
          #   .pdb  — Windows debug symbols (no use on macOS)
          #   .xml  — IntelliSense docs (only needed in an IDE)
          #   .deps.json — dependency manifest (only needed by dotnet CLI tooling)
          #   .runtimeconfig.json — only needed for framework-dependent apps;
          #                         self-contained apps embed this info in the binary
          find "TaskLogger.app" \( \
            -name "*.pdb" -o \
            -name "*.xml" -o \
            -name "*.deps.json" -o \
            -name "*.runtimeconfig.json" \
          \) -delete

          # Re-sign all native .dylib files to clear Microsoft's Team ID.
          # Without this the app crashes at launch with "Team ID mismatch".
          find "TaskLogger.app" -name "*.dylib" \
            -print0 | xargs -0 -I{} codesign --force --sign - "{}"

          # Sign every .dll. Some reference-only assemblies may fail — || true
          # skips those. The bundle signing below handles the rest.
          find "TaskLogger.app" -name "*.dll" \
            -print0 | xargs -0 -I{} sh -c 'codesign --force --sign - "$1" 2>/dev/null || true' _ {}

          # Sign the bundle. --no-strict tells codesign not to require every
          # non-binary asset (.json etc.) to be individually signed.
          codesign --force --sign - --no-strict "TaskLogger.app"

      # create-dmg makes the drag-to-Applications installer window
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p dist
          cp -r TaskLogger.app dist/
          create-dmg \
            --volname "TaskLogger" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "TaskLogger.app" 150 185 \
            --hide-extension "TaskLogger.app" \
            --app-drop-link 390 185 \
            "TaskLogger-macOS.dmg" \
            "dist/"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: TaskLogger-macOS
          path: TaskLogger-macOS.dmg
          retention-days: 30
