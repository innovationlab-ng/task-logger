name: Build & Package

# ── When this runs ────────────────────────────────────────────────────────────
# • Automatically on every push to the main branch
# • Manually from the GitHub Actions tab (workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Opt into Node.js 24 now so actions/checkout, setup-dotnet and
# upload-artifact run on the new runtime before GitHub forces the switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Windows installer (.exe)
  # Runs on a real Windows Server VM hosted by GitHub (free)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest

    steps:

      # 1. Download your source code onto the VM
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Install the correct .NET version
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. Compile and publish a single self-contained Windows binary
      #    --self-contained                   : bundles the .NET runtime — no install needed on target PC
      #    PublishSingleFile                  : merges everything into one .exe
      #    IncludeNativeLibrariesForSelfExtract: bundles native DLLs (libSkiaSharp etc.)
      #                                         so the app doesn't crash on first launch
      - name: Publish (Windows x64)
        run: >
          dotnet publish TaskLoggerApp.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win

      # 4. Run Inno Setup (pre-installed on all GitHub Windows runners)
      #    This reads installer/TaskLogger.iss and produces the setup wizard .exe
      - name: Build Windows installer (Inno Setup)
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          installer\TaskLogger.iss

      # 5. Upload the finished installer so you can download it from GitHub
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskLogger-Windows-Setup
          path: installer/Output/TaskLoggerSetup.exe
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — macOS DMG installer
  # Runs on a real macOS (Apple Silicon) VM hosted by GitHub (free)
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest   # Apple Silicon (M-series) runner

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Publish Apple Silicon binary
      # NO PublishSingleFile — on macOS, native .dylib files (libSkiaSharp etc.)
      # must sit alongside the binary inside Contents/MacOS/. Bundling them into
      # a single file causes a crash because macOS security prevents extracting
      # them to a temp directory at runtime.
      - name: Publish (macOS arm64)
        run: >
          dotnet publish TaskLoggerApp.csproj
          -c Release
          -r osx-arm64
          --self-contained true
          -o publish/osx-arm64

      # Publish Intel binary (for older Macs)
      - name: Publish (macOS x64)
        run: >
          dotnet publish TaskLoggerApp.csproj
          -c Release
          -r osx-x64
          --self-contained true
          -o publish/osx-x64

      # Build the .app bundle structure that macOS expects:
      #   TaskLogger.app/
      #     Contents/
      #       Info.plist        ← app metadata (bundle ID, name, version)
      #       MacOS/
      #         TaskLogger      ← the main executable (renamed from TaskLoggerApp)
      #         libSkiaSharp.dylib  ← native libraries live here alongside binary
      #         *.dll               ← managed assemblies
      - name: Build .app bundle (arm64)
        run: |
          mkdir -p "TaskLogger.app/Contents/MacOS"
          mkdir -p "TaskLogger.app/Contents/Resources"
          # Copy ALL published files so native dylibs are beside the binary
          cp -r publish/osx-arm64/. "TaskLogger.app/Contents/MacOS/"
          # Rename the main binary to match CFBundleExecutable in Info.plist
          mv "TaskLogger.app/Contents/MacOS/TaskLoggerApp" "TaskLogger.app/Contents/MacOS/TaskLogger"
          chmod +x "TaskLogger.app/Contents/MacOS/TaskLogger"
          cp installer/Info.plist "TaskLogger.app/Contents/Info.plist"

      # Ad-hoc code signing.
      # .NET bundles contain mixed content (.dll, .dylib, .json, .dat etc.).
      # codesign --deep fails on anything it can't sign.
      # The correct approach for .NET:
      #   1. Strip debug/metadata files that have no place in a release build
      #   2. Sign all native .dylib files (clears Microsoft Team ID)
      #   3. Sign the main executable
      #   4. Sign the bundle with --no-strict, which tells codesign not to require
      #      every subcomponent to be individually signed — designed exactly for
      #      runtimes like .NET that bundle non-code assets alongside binaries.
      - name: Ad-hoc sign .app bundle
        run: |
          # Remove files that serve no purpose in a release and confuse codesign
          find "TaskLogger.app" -name "*.pdb" -delete
          find "TaskLogger.app" -name "*.xml" -delete

          # Sign all native libraries (fixes Team ID mismatch at runtime)
          find "TaskLogger.app" -name "*.dylib" | while read f; do
            codesign --force --sign - "$f"
          done

          # Sign the main executable
          codesign --force --sign - "TaskLogger.app/Contents/MacOS/TaskLogger"

          # Sign the bundle — --no-strict skips the requirement that every
          # subcomponent (e.g. .dll, .json) is also individually signed
          codesign --force --sign - \
            --no-strict \
            --options runtime \
            --entitlements installer/entitlements.plist \
            "TaskLogger.app"

      # create-dmg makes the drag-to-Applications installer window
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p dist
          cp -r TaskLogger.app dist/
          create-dmg \
            --volname "TaskLogger" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "TaskLogger.app" 150 185 \
            --hide-extension "TaskLogger.app" \
            --app-drop-link 390 185 \
            "TaskLogger-macOS.dmg" \
            "dist/"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: TaskLogger-macOS
          path: TaskLogger-macOS.dmg
          retention-days: 30
